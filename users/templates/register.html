{% extends "base.html" %}

{% block title %} 
Registration Page 
{% endblock %} 

{% block content %} 

<div class="container py-5">

    <p class="h2 text-center mb-4">Registration Form</p>

    <form method="post">
        {% csrf_token %}

        {{ register_form.as_p }}

        <div class="text-center">
            <button type="submit" class="btn btn-primary">
                Sign Up
            </button>
        </div>
    </form>

</div>

{% endblock %}
